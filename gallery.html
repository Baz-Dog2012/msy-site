<style>

html {
    overflow-y: scroll;
}

body {
    margin: 0;
    background: #000;
    color: #ddd;
    font-family: Arial, sans-serif;
}

.wrapper {
    max-width: 1040px;
    margin: auto;
    padding: 80px 20px;
    text-align: center;
}

/* ✅ EXPLICITLY VISIBLE LOGO */
.logo {
    max-width: 1040px;
    width: 100%;
    margin-bottom: 70px;
    display: block;
    opacity: 1;   /* <-- this is the fix */
}

.content {
    max-width: 995px;
    margin: 0 auto;
}

/* image stage */
.image-stage {
    position: relative;
    width: 900px;
    height: 900px;
    margin: -120px auto 0 auto;
}

.image-stage img {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    max-width: 100%;
    max-height: 100%;

    opacity: 0;
    animation: fadeIn 1.6s ease forwards 0.3s;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* unified bottom block */
.nav {
    margin-top: 10px;
    text-align: center;
}

.nav .block {
    display: inline-block;
}

.nav .links {
    margin-bottom: 20px;
}

.nav .contact {
    margin-bottom: 20px;
    font-size: 14px;
}

.footer {
    font-size: 12px;
    color: #777;
    line-height: 1.4;
}

.footer p {
    margin: 0;
}

a {
    color: #bbb;
    text-decoration: none;
}

</style>
</head>

</div>
